<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AapdaSetu | Analytics</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="css/analytics-style.css">
</head>
<body>

<div class="container-fluid">
    <div class="row">
        
        <div class="col-md-2 sidebar d-none d-md-block">
            <h4 class="text-center mb-5 fw-bold pt-2">🛑 AapdaSetu</h4>
            <small class="text-muted text-uppercase fw-bold ms-3" style="font-size: 0.7rem;">Operations</small>
            
            <a href="index.html"><i class="bi bi-crosshair me-2"></i> Mission Control</a>
            <a href="resource_allocation.html"><i class="bi bi-box-seam me-2"></i> Resource Alloc.</a>
            <a href="ai_mesh.html"><i class="bi bi-cpu me-2"></i> AI Mesh Network</a>
            <a href="analytics.html" class="active"><i class="bi bi-bar-chart me-2"></i> Analytics</a>
            
            <div class="mt-5 pt-5">
                <a href="../index.html" class="text-danger"><i class="bi bi-box-arrow-left me-2"></i> Logout</a>
            </div>
        </div>

        <div class="col-md-10 main-content">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="fw-bold text-dark">Post-Disaster Analytics</h3>
                <button class="btn btn-outline-primary btn-sm" onclick="loadAnalytics()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh Data
                </button>
            </div>

            <div class="row g-4">
                <div class="col-md-8">
                    <div class="card stat-card p-3">
                        <h5 class="fw-bold mb-3">Response Efficiency (Minutes to Deploy)</h5>
                        <canvas id="timeChart" height="120"></canvas>
                        <p class="text-muted small mt-2 text-center">Blue line shows actual time taken for recent incidents.</p>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card stat-card p-3 h-100">
                        <h5 class="fw-bold mb-3">Incident Breakdown</h5>
                        <div style="height: 250px; display: flex; justify-content: center;">
                            <canvas id="catChart"></canvas>
                        </div>
                        <div class="mt-4 text-center">
                            <h2 class="fw-bold text-success" id="total-resolved">0</h2>
                            <small class="text-muted">Total Incidents Managed</small>
                        </div>
                    </div>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/analytics-script.js"></script>

</body>
</html>
